name: Bug Report
description: Report an issue with the competitive programming collection
title: 'bug: '
labels: [bug]
body:
  - type: checkboxes
    attributes:
      label: Prerequisites
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true

  - type: input
    attributes:
      label: Problem or file
      placeholder: codeforces/..., cses/..., kattis/...
    validations:
      required: true

  - type: input
    attributes:
      label: Language or toolchain
      placeholder: g++ 14, Python 3.12, etc.

  - type: textarea
    attributes:
      label: Description
      description: What happened, and what did you expect to happen?
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Compile or run ...
        2. Use input ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    attributes:
      label: Input, output, or judge result
      description: Include the failing input, expected output, actual output, or verdict
      render: text
